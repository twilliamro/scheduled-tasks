name: Test Setup

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check secrets are configured
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }} 
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }} 
          TWILIO_PHONE_NUMBER: ${{ secrets.TWILIO_PHONE_NUMBER }} 
          MY_PHONE_NUMBER: ${{ secrets.MY_PHONE_NUMBER }} 
          API_key: ${{ secrets.API_key }} 
          MY_LAT: ${{ secrets.MY_LAT }} 
          MY_LONG: ${{ secrets.MY_LONG }} 

        run: |
          if [ -z "$TWILIO_ACCOUNT_SID" ]; then
            echo "TWILIO_ACCOUNT_SID secret is not set!"
            echo "Go to Settings > Secrets > Actions and add it."
            exit 1
          else
            echo "TWILIO_ACCOUNT_SID is configured"
          fi
          if [ -z "$TWILIO_AUTH_TOKEN" ]; then
            echo "TWILIO_AUTH_TOKEN secret is not set!"
            echo "Go to Settings > Secrets > Actions and add it."
            exit 1
          else
            echo "TWILIO_AUTH_TOKEN is configured"
          fi
          if [ -z "$TWILIO_PHONE_NUMBER" ]; then
            echo "TWILIO_PHONE_NUMBER secret is not set!"
            echo "Go to Settings > Secrets > Actions and add it."
            exit 1
          else
            echo "TWILIO_PHONE_NUMBER is configured"
          fi

          if [ -z "$MY_PHONE_NUMBER" ]; then
            echo "MY_PHONE_NUMBER secret is not set!"
            echo "Go to Settings > Secrets > Actions and add it."
            exit 1
          else
            echo "MY_PHONE_NUMBER is configured"
          fi

          if [ -z "$API_key" ]; then
            echo "API_key secret is not set!"
            echo "Go to Settings > Secrets > Actions and add it."
            exit 1
          else
            echo "API_key is configured"
          fi

          if [ -z "$MY_LAT" ]; then
            echo "MY_LAT secret is not set!"
            echo "Go to Settings > Secrets > Actions and add it."
            exit 1
          else
            echo "MY_LAT is configured"
          fi
          if [ -z "$MY_LONG" ]; then
            echo "MY_LONG secret is not set!"
            echo "Go to Settings > Secrets > Actions and add it."
            exit 1
          else
            echo "MY_LONG is configured"
          fi
  
          echo ""
          echo "All secrets are configured!"

      - name: Check required files exist
        run: |
          echo "Checking for required files..."

          if [ -f "main.py" ]; then
            echo "main.py found"
          else
            echo "main.py not found!"
            exit 1
          fi

          if [ -f "requirements.txt" ]; then
            echo "requirements.txt found"
          else
            echo "requirements.txt not found!"
            exit 1
          fi

          echo ""
          echo "All required files found!"

      - name: Test Python syntax
        run: python -m py_compile main.py && echo "Python syntax OK"

      - name: Success
        run: |
          echo ""
          echo "========================================"
          echo "  All checks passed!"
          echo "  Your setup is ready to go."
          echo "========================================"
